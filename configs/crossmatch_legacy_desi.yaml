# Phase 0: cross-match Legacy Surveys images against DESI spectra on sky position.
#
# HATS catalogs are opened from Hugging Face with the hf:// protocol; the real repos live in
# https://huggingface.co/collections/UniverseTBD/multimodal-universe-hats
# The column names below are still best-guesses at MMU's schema. Confirm them (and the
# arrays-present check) by running: python scripts/verify_catalogs.py --config <this file>
# which prints each catalog's actual columns.

image_catalog:
  # DECaLS/Legacy Surveys imaging (the imaging DESI targets from, so it overlaps DESI well).
  # Alternative image catalog: hf://datasets/UniverseTBD/mmu_ssl_legacysurvey_north
  # Confirm this catalog's size and crossmatch yield against mmu_desi_edr_sv3 before a full build.
  hats_path: "hf://datasets/UniverseTBD/mmu_legacysurvey_test"
  base_hf_id: MultimodalUniverse/legacysurvey
  ra_column: ra
  dec_column: dec
  image_column: image            # multi-band (g, r, z) pixel array (confirm name via verify script)
  extra_columns: []

spectrum_catalog:
  # DESI Early Data Release, Survey Validation 3 spectra (the AstroCLIP pairing).
  hats_path: "hf://datasets/UniverseTBD/mmu_desi_edr_sv3"
  base_hf_id: MultimodalUniverse/desi
  ra_column: ra
  dec_column: dec
  flux_column: flux              # spectrum flux array (confirm name via verify script)
  wavelength_column: lambda      # spectrum wavelength grid (confirm name via verify script)
  redshift_column: redshift      # spectroscopic redshift, primary probe target (confirm name)
  extra_columns: []

match:
  radius_arcsec: 1.0             # standard optical same-object radius; matches the blog example
  n_neighbors: 1

output:
  output_dir: aligned/legacy_desi
  shard_size: 512                # objects per .npz shard
  n_objects: 20000              # cap for laptop-scale prototyping (raise on a bigger machine)

split:
  seed: 42
  val_fraction: 0.1
  test_fraction: 0.1
